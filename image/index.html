<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujol | Puja Animation & Music</title>
    <style>
        body {
            margin: 0;
            padding: 30px 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            animation: fadeInDown 1s ease-in;
        }

        .img-container {
            display: inline-block;
            width: 90%;
            max-width: 600px;
        }

        img {
            width: 100%;
            height: auto;
            border: 5px solid #fff;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            animation: entrance 1.5s ease-out, floating 3s ease-in-out infinite;
        }

        /* মিউজিক বাটন স্টাইল */
        #musicBtn {
            margin-top: 25px;
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            background: #00d4ff;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,212,255,0.3);
            transition: 0.3s;
        }

        .back-link {
            margin-top: 40px;
            display: block;
            color: #aaa;
            text-decoration: none;
            font-size: 16px;
        }

        /* অ্যানিমেশনসমূহ */
        @keyframes entrance {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <h1>আপনার পূজা</h1>

    <div class="img-container">
        <img src="puja.jpg" alt="Puja Photo">
    </div>

    <br>

    <!-- অনলাইন মিউজিক প্লেয়ার -->
    <audio id="bgMusic" loop>
        <!-- এখানে একটি অনলাইন স্যাম্পল মিউজিক লিঙ্ক দেওয়া হয়েছে -->
        <source src="https://soundhelix.com" type="audio/mpeg">
    </audio>

    <button id="musicBtn" onclick="toggleMusic()">🎵 মিউজিক চালান</button>

    <a href="../index.html" class="back-link">← মেইন পেজে ফিরে যান</a>

    <script>
        var music = document.getElementById("bgMusic");
        var btn = document.getElementById("musicBtn");

        function toggleMusic() {
            if (music.paused) {
                music.play();
                btn.innerHTML = "⏸ মিউজিক থামান";
                btn.style.background = "#ff4b2b";
            } else {
                music.pause();
                btn.innerHTML = "🎵 মিউজিক চালান";
                btn.style.background = "#00d4ff";
            }
        }

        // স্ক্রিনের যেকোনো জায়গায় প্রথম ক্লিকের সাথে গান শুরু হবে
        window.addEventListener('click', function() {
            if (music.paused) {
                toggleMusic();
            }
        }, { once: true });
    </script>

</body>
</html>
