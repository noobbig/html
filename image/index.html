<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujol | Puja</title>
    <style>
        body {
            margin: 0;
            padding: 30px 10px;
            font-family: sans-serif;
            background-color: #000; 
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .img-container {
            display: inline-block;
            width: 90%;
            max-width: 600px;
            cursor: pointer;
            overflow: hidden;
            border-radius: 15px;
            background: #000;
        }

        img {
            width: 90%;
            height: auto;
            border: 5px solid #fff;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            
            /* শুরুতে পর্দা সম্পূর্ণ বন্ধ */
            clip-path: inset(0 50% 0 50%); 
            opacity: 0; 
            display: block;
        }

        /* ৫ সেকেন্ড পর এই ক্লাসটি যুক্ত হবে */
        .curtain-action {
            animation: curtainOpen 30s linear forwards;
        }

        @keyframes curtainOpen {
            0% {
                clip-path: inset(0 50% 0 50%);
                opacity: 0.5;
                transform: scale(1.1);
            }
            100% {
                clip-path: inset(0 0 0 0);
                opacity: 1;
                transform: scale(1);
            }
        }

        .instruction {
            margin-top: 20px;
            font-size: 18px;
            color: #00d4ff;
            font-weight: bold;
            cursor: pointer;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .back-link {
            margin-top: 50px;
            display: block;
            color: #555;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>পূজা</h1>

    <div class="img-container" id="playTrigger">
        <img src="puja.jpg" alt="Puja Photo" id="pujaPic">
    </div>

    <p id="msg" class="instruction">শুরু করতে এখানে ক্লিক করুন</p>

    <!-- পুরো গান বাজার জন্য loop রাখা হয়েছে -->
    <audio id="bgMusic" loop>
        <source src="flute.mp3" type="audio/mpeg">
    </audio>

    <a href="../index.html" class="back-link">← মেইন পেজে ফিরে যান</a>

    <script>
        var music = document.getElementById("bgMusic");
        var pic = document.getElementById("pujaPic");
        var msg = document.getElementById("msg");
        var trigger = document.getElementById("playTrigger");

        function startShow() {
            // ১. ক্লিক করার সাথে সাথে গান শুরু হবে (যা শেষ পর্যন্ত চলবে)
            music.play().catch(e => console.log("Music error:", e));
            
            msg.innerText = "   ";
            msg.style.animation = "none";

            // ২. গান শুরু হওয়ার ঠিক ৫ সেকেন্ড পর পর্দা খোলা শুরু হবে
            setTimeout(function() {
                pic.classList.add("curtain-action");
                msg.innerText = "Kaisa Laga Mera Majak✨";
            }, 5000); 
        }

        // ইউজার ক্লিক করলে পুরো প্রসেস শুরু হবে
        trigger.addEventListener('click', startShow, { once: true });
        msg.addEventListener('click', startShow, { once: true });
    </script>

</body>
</html>
