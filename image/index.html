<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujol | Puja</title>
    <style>
        body {
            margin: 0;
            padding: 30px 10px;
            font-family: sans-serif;
            background-color: #000;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .img-container {
            position: relative;
            display: inline-block;
            width: 90%;
            max-width: 600px;
            cursor: pointer;
            overflow: hidden;
            border-radius: 15px;
            background: #111;
        }

        img {
            width: 100%;
            height: auto;
            border: 5px solid #fff;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            clip-path: inset(0 50% 0 50%);
            opacity: 0;
            display: block;
        }

        /* ছবির ওপরে থাকা ইনস্ট্রাকশন */
        .instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            margin: 0;
            font-size: 20px;
            color: #00d4ff;
            font-weight: bold;
            z-index: 10;
            animation: blink 1.5s infinite;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        /* ছবির নিচে আসার জন্য নতুন স্টাইল */
        .msg-bottom {
            position: relative !important;
            top: 0 !important;
            left: 0 !important;
            transform: none !important;
            margin-top: 20px !important;
            color: #ffd700 !important;
            animation: none !important;
        }

        .curtain-action {
            animation: curtainOpen 30s linear forwards;
        }

        @keyframes curtainOpen {
            0% { clip-path: inset(0 50% 0 50%); opacity: 0.5; transform: scale(1.1); }
            100% { clip-path: inset(0 0 0 0); opacity: 1; transform: scale(1); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .back-link {
            margin-top: 50px;
            display: block;
            color: #555;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>পূজা</h1>

    <div class="img-container" id="playTrigger">
        <img src="puja.jpg" alt="Puja Photo" id="pujaPic">
        <p id="msg" class="instruction">শুরু করতে এখানে ক্লিক করুন</p>
    </div>

    <!-- ছবির নিচে আসার জন্য একটি খালি জায়গা রাখা হলো -->
    <div id="bottomMsgContainer"></div>

    <audio id="bgMusic" loop>
        <source src="flute.mp3" type="audio/mpeg">
    </audio>

    <a href="../index.html" class="back-link">← মেইন পেজে ফিরে যান</a>

    <script>
        var music = document.getElementById("bgMusic");
        var pic = document.getElementById("pujaPic");
        var msg = document.getElementById("msg");
        var trigger = document.getElementById("playTrigger");
        var bottomContainer = document.getElementById("bottomMsgContainer");

        function startShow() {
            music.play().catch(e => console.log("Music error:", e));
            
            // ক্লিক করার সাথে সাথে উপরের টেক্সট ভ্যানিশ
            msg.style.display = "none";

            setTimeout(function() {
                pic.classList.add("curtain-action");
                
                // লেখাটিকে ছবির কন্টেইনার থেকে বের করে নিচে নিয়ে আসা
                bottomContainer.appendChild(msg); 
                msg.innerText = "Kaisa Laga Mera Majak✨";
                msg.classList.add("msg-bottom");
                msg.style.display = "block";
            }, 5000);
        }

        trigger.addEventListener('click', startShow, { once: true });
    </script>

</body>
</html>
