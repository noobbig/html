<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujol | Puja Special</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            cursor: pointer;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
        }

        /* পেজ লোড হলেই এই লেখাটি দেখা যাবে */
        #main-text {
            font-size: 35px;
            font-weight: bold;
            color: #ffd700;
            z-index: 10;
            transition: opacity 1.5s, transform 1.5s;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            animation: fadeIn 2s ease-in; /* লোড হওয়ার সময় হালকা এনিমেশন */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .img-container {
            width: 90%;
            max-width: 550px;
            position: relative;
            margin-top: 20px;
        }

        img {
            width: 100%;
            height: auto;
            border: 4px solid #fff;
            border-radius: 15px;
            clip-path: inset(0 50% 0 50%); 
            opacity: 0;
        }

        /* পর্দা খোলার এনিমেশন ক্লাস */
        .curtain-open {
            animation: curtainAction 30s linear forwards;
        }

        @keyframes curtainAction {
            0% { clip-path: inset(0 50% 0 50%); opacity: 0.5; transform: scale(1.1); }
            100% { clip-path: inset(0 0 0 0); opacity: 1; transform: scale(1); }
        }

        .click-hint {
            margin-top: 30px;
            font-size: 16px;
            color: #00d4ff;
            font-weight: bold;
            letter-spacing: 2px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body onclick="startShow()" ontouchstart="startShow()">

    <!-- পেজ লোড হতেই এই টেক্সটটি দেখা যাবে -->
    <div id="main-text">শুভ শারদীয়া পূজা</div>

    <div class="img-container">
        <img src="puja.jpg" alt="Puja Photo" id="pujaPic">
    </div>

    <!-- টাচ করার নির্দেশিকা -->
    <p id="hint" class="click-hint">শুরু করতে টাচ করুন</p>

    <audio id="bgMusic" loop preload="auto">
        <source src="flute.mp3" type="audio/mpeg">
    </audio>

    <script>
        var music = document.getElementById("bgMusic");
        var pic = document.getElementById("pujaPic");
        var text = document.getElementById("main-text");
        var hint = document.getElementById("hint");
        var isStarted = false;

        function startShow() {
            if (isStarted) return; 
            isStarted = true;

            // ১. ক্লিক করার সাথে সাথে গান শুরু
            music.play().catch(e => console.log("Music error:", e));

            // ২. লেখা ও হিন্ট পরিবর্তন
            text.innerHTML = "অপেক্ষা করুন... <br> পর্দা খুলছে";
            hint.style.display = "none";

            // ৩. ঠিক ৫ সেকেন্ড পর পর্দা খোলা শুরু (গান কিন্তু চলতেই থাকবে)
            setTimeout(function() {
                pic.classList.add("curtain-open");
                text.style.opacity = "0"; 
            }, 5000);
        }
    </script>
</body>
</html>
