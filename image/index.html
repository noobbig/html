<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujol | Puja</title>
    <style>
        body {
            margin: 0;
            padding: 30px 10px;
            font-family: sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            animation: fadeInDown 1s ease-in;
        }

        .img-container {
            display: inline-block;
            width: 90%;
            max-width: 600px;
            cursor: pointer; /* ছবির ওপর মাউস নিলে হাতের চিহ্ন আসবে */
        }

        img {
            width: 100%;
            height: auto;
            border: 5px solid #fff;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            animation: entrance 1.5s ease-out, floating 3s ease-in-out infinite;
            transition: 0.4s;
        }

        /* স্পর্শ করলে বা মাউস নিলে ছবিটা হালকা গ্লো করবে */
        img:hover {
            transform: scale(1.02);
            border-color: #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
        }

        .instruction {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
            font-style: italic;
        }

        .back-link {
            margin-top: 50px;
            display: block;
            color: #00d4ff;
            text-decoration: none;
            font-size: 16px;
        }

        /* অ্যানিমেশনসমূহ */
        @keyframes entrance {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>আপনার পূজা</h1>

    <div class="img-container">
        <!-- ছবিতে স্পর্শ করলেই গান বাজবে -->
        <img src="puja.jpg" alt="Puja Photo" id="pujaPic">
    </div>

    <p class="instruction">মিউজিক শুনতে ছবিতে স্পর্শ করুন</p>

    <audio id="bgMusic" loop>
        <source src="flute.mp3" type="audio/mpeg">
    </audio>

    <a href="../index.html" class="back-link">← মেইন পেজে ফিরে যান</a>

    <script>
        var music = document.getElementById("bgMusic");
        var pic = document.getElementById("pujaPic");

        // মিউজিক চালু করার ফাংশন
        function playMusic() {
            music.play().catch(function(error) {
                console.log("Play failed:", error);
            });
        }

        // ছবির ওপর মাউস নিলে (Desktop)
        pic.addEventListener('mouseenter', playMusic, { once: true });

        // ছবিতে স্পর্শ করলে (Mobile)
        pic.addEventListener('touchstart', playMusic, { once: true });
        
        // ব্যাকআপ: যদি কেউ সরাসরি ক্লিক করে
        pic.addEventListener('click', playMusic, { once: true });
    </script>

</body>
</html>
