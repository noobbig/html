<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujol | Puja</title>
    <style>
        body {
            margin: 0;
            padding: 30px 10px;
            font-family: sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .img-container {
            display: inline-block;
            width: 90%;
            max-width: 600px;
            cursor: pointer;
            overflow: hidden;
            border-radius: 15px;
            background: #000; /* পর্দা খোলার আগে ব্যাকগ্রাউন্ড কালো থাকবে */
        }

        img {
            width: 100%;
            height: auto;
            border: 5px solid #fff;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            /* শুরুতে পর্দা বন্ধ থাকবে */
            clip-path: inset(0 50% 0 50%); 
            transition: 0.4s;
            display: block;
        }

        /* এই ক্লাসটি জাভাস্ক্রিপ্ট দিয়ে যুক্ত করা হবে */
        .start-animation {
            animation: curtainOpen 30s linear forwards;
        }

        @keyframes curtainOpen {
            0% {
                clip-path: inset(0 50% 0 50%);
                transform: scale(1.1);
            }
            100% {
                clip-path: inset(0 0 0 0);
                transform: scale(1);
            }
        }

        .instruction {
            margin-top: 15px;
            font-size: 16px;
            color: #00d4ff;
            font-weight: bold;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .back-link {
            margin-top: 50px;
            display: block;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>আপনার পূজা</h1>

    <div class="img-container" id="mainContainer">
        <!-- ছবিতে স্পর্শ করলেই গান বাজবে এবং পর্দা সরবে -->
        <img src="puja.jpg" alt="Puja Photo" id="pujaPic">
    </div>

    <p id="msg" class="instruction">শুরু করতে এখানে ক্লিক করুন</p>

    <audio id="bgMusic" loop>
        <source src="flute.mp3" type="audio/mpeg">
    </audio>

    <a href="../index.html" class="back-link">← মেইন পেজে ফিরে যান</a>

    <script>
        var music = document.getElementById("bgMusic");
        var pic = document.getElementById("pujaPic");
        var msg = document.getElementById("msg");

        function startEverything() {
            // গান প্লে করা
            music.play().catch(function(error) {
                console.log("Play failed:", error);
            });

            // পর্দার অ্যানিমেশন শুরু করা
            pic.classList.add("start-animation");

            // টেক্সট পরিবর্তন বা হাইড করা
            msg.innerText = "উপভোগ করুন...";
            msg.style.animation = "none"; 
        }

        // ক্লিক বা টাচ করলে একসাথে শুরু হবে
        document.getElementById("mainContainer").addEventListener('click', startEverything, { once: true });
        document.getElementById("mainContainer").addEventListener('touchstart', startEverything, { once: true });
    </script>

</body>
</html>
