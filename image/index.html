<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujol | Puja Special</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        /* স্ক্রিনের মাঝখানের লেখা */
        #main-text {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            z-index: 10;
            transition: opacity 1.5s, transform 1.5s;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .img-container {
            position: relative;
            width: 85%;
            max-width: 550px;
            margin-top: 20px;
        }

        img {
            width: 100%;
            height: auto;
            border: 4px solid #fff;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            /* শুরুতে পর্দা বন্ধ */
            clip-path: inset(0 50% 0 50%); 
            opacity: 0;
        }

        /* ৫ সেকেন্ড পর গান চলা অবস্থায় এই ক্লাসটি কাজ করবে */
        .curtain-open {
            animation: curtainAction 30s linear forwards;
        }

        @keyframes curtainAction {
            0% { 
                clip-path: inset(0 50% 0 50%); 
                opacity: 0.5; 
                transform: scale(1.1);
            }
            100% { 
                clip-path: inset(0 0 0 0); 
                opacity: 1; 
                transform: scale(1);
            }
        }

        .footer-msg {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            color: #444;
        }
    </style>
</head>
<body onclick="startShow()" ontouchstart="startShow()">

    <!-- পর্দা খোলার আগে এই লেখাটি দেখা যাবে -->
    <div id="main-text">
        শুভ শারদীয়া পূজা <br>
        <span style="font-size: 16px; color: #00d4ff;">স্ক্রিনে টাচ করুন</span>
    </div>

    <div class="img-container">
        <img src="puja.jpg" alt="Puja Photo" id="pujaPic">
    </div>

    <!-- গানটি লুপে চলতেই থাকবে -->
    <audio id="bgMusic" loop>
        <source src="flute.mp3" type="audio/mpeg">
    </audio>

    <div class="footer-msg">পুজা স্পেশাল প্রেজেন্টেশন</div>

    <script>
        var music = document.getElementById("bgMusic");
        var pic = document.getElementById("pujaPic");
        var text = document.getElementById("main-text");
        var isStarted = false;

        function startShow() {
            if (isStarted) return; 
            isStarted = true;

            // ১. টাচ করার সাথে সাথে গান শুরু হবে এবং তা বাজতেই থাকবে
            music.play().catch(function(error) {
                console.log("Music play failed:", error);
            });

            // ২. স্ক্রিনের টেক্সট পরিবর্তন
            text.innerHTML = "অপেক্ষা করুন... <br> পর্দা খুলছে";
            text.style.transform = "scale(1.2)";

            // ৩. ঠিক ৫ সেকেন্ড পর পর্দা খোলা শুরু হবে (গান কিন্তু বন্ধ হবে না)
            setTimeout(function() {
                pic.classList.add("curtain-open");
                text.style.opacity = "0"; // পর্দা খোলার সময় লেখাটি হালকা হয়ে মিশে যাবে
            }, 5000);
        }
    </script>
</body>
</html>
