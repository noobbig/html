<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার প্রজেক্ট</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-top: 15px;
            border: 2px solid #ddd;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>গিটহাব ওয়েবসাইট</h1>
        <p>নিচের ছবিটি সরাসরি <strong>image/</strong> ফোল্ডার থেকে আসছে:</p>
        
        <a href="image/index.html" class="btn">ইমেজ ফোল্ডারের ফাইলটি দেখুন</a>
    </div>

</body>
</html>
